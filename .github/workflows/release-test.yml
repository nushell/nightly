#
# REF:
#   1. https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstrategymatrixinclude
#
name: Create Release Draft

on:
  push:
    branches:
    - release/testing
    tags:
    - 'v*'

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Nu

    strategy:
      fail-fast: false
      matrix:
        target:
        - riscv64gc-unknown-linux-musl
        - loongarch64-unknown-linux-musl
        extra: ['bin']
        include:
        - target: riscv64gc-unknown-linux-musl
          image: alpine:latest
          os: ubuntu-latest
        - target: loongarch64-unknown-linux-musl
          image: alpine:latest
          os: ubuntu-latest

    runs-on: ${{matrix.os}}
    container:
      image: ${{matrix.image}}
      options: --entrypoint /bin/sh

    steps:
    - uses: actions/checkout@v4.1.7
    - name: Prepare Build Env for Alpine
      shell: sh
      run: |
        apk update
        apk add bash curl
        # Fix Error loading shared library libgcc_s.so.1: No such file or directory
        apk add libgcc
        # Install build tools including the cc linker
        apk add build-base
        # Ensure Consistent Home Directory
        echo "HOME=/root" >> $GITHUB_ENV
    - name: Update Rust Toolchain Target
      run: |
        echo "targets = ['${{matrix.target}}']" >> rust-toolchain.toml

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1.9.0
      # WARN: Keep the rustflags to prevent from the winget submission error: `CAQuietExec: Error 0xc0000135`
      with:
        cache: false
        rustflags: ''

    - name: Setup Nushell
      run: |
        echo "https://alpine.fury.io/nushell/" | tee -a /etc/apk/repositories
        apk update || true
        apk add --allow-untrusted nushell
        nu -c '$nu.current-exe | print; version'

    - name: Release Nu Binary
      id: nu
      run: nu .github/workflows/release-pkg.nu
      env:
        OS: alpine
        REF: ${{ github.ref }}
        TARGET: ${{ matrix.target }}
        _EXTRA_: ${{ matrix.extra }}

    # REF: https://github.com/marketplace/actions/gh-release
    - name: Publish Archive
      uses: softprops/action-gh-release@v2.0.8
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      with:
        draft: true
        files: ${{ steps.nu.outputs.archive }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sha256sum:
    name: Create Sha256sum
    needs: release
    runs-on: ubuntu-latest
    steps:
    - name: Download Release Archives
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >-
        gh release download ${{ github.ref_name }}
        --repo ${{ github.repository }}
        --pattern '*'
        --dir release
    - name: Create Checksums
      run: cd release && shasum -a 256 * > ../SHA256SUMS
    - name: Publish Checksums
      uses: softprops/action-gh-release@v2.0.8
      with:
        draft: true
        files: SHA256SUMS
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
